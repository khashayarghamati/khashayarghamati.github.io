<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Placeholder cover art for The Reed Flute">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#16255a"/>
      <stop offset="60%" stop-color="#0e1c46"/>
      <stop offset="100%" stop-color="#0a1638"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c876"/>
      <stop offset="100%" stop-color="#c49a41"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Girih border frame -->
  <rect x="40" y="40" width="720" height="720" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>
  <rect x="54" y="54" width="692" height="692" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Corner eight-point stars -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="none" opacity="0.9">
    <g transform="translate(96,96) scale(0.45) translate(-50,-50)">
      <path d="M96 50 L50 96 L4 50 L50 4 Z"/><path d="M82.5 17.5 L82.5 82.5 L17.5 82.5 L17.5 17.5 Z"/>
    </g>
    <g transform="translate(704,96) scale(0.45) translate(-50,-50)">
      <path d="M96 50 L50 96 L4 50 L50 4 Z"/><path d="M82.5 17.5 L82.5 82.5 L17.5 82.5 L17.5 17.5 Z"/>
    </g>
    <g transform="translate(96,704) scale(0.45) translate(-50,-50)">
      <path d="M96 50 L50 96 L4 50 L50 4 Z"/><path d="M82.5 17.5 L82.5 82.5 L17.5 82.5 L17.5 17.5 Z"/>
    </g>
    <g transform="translate(704,704) scale(0.45) translate(-50,-50)">
      <path d="M96 50 L50 96 L4 50 L50 4 Z"/><path d="M82.5 17.5 L82.5 82.5 L17.5 82.5 L17.5 17.5 Z"/>
    </g>
  </g>

  <!-- Tar silhouette -->
  <g fill="url(#gold)" transform="translate(400,150) scale(1.35)">
    <rect x="-8" y="0" width="16" height="34" rx="4"/>
    <rect x="-20" y="6" width="14" height="4" rx="2"/><rect x="6" y="6" width="14" height="4" rx="2"/>
    <rect x="-20" y="16" width="14" height="4" rx="2"/><rect x="6" y="16" width="14" height="4" rx="2"/>
    <rect x="-6" y="34" width="12" height="150" rx="2"/>
    <ellipse cx="0" cy="204" rx="30" ry="28"/>
    <ellipse cx="0" cy="262" rx="42" ry="44"/>
    <circle cx="0" cy="264" r="12" fill="#0e1c46"/>
    <circle cx="0" cy="264" r="12" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  </g>

  <!-- Blues accent hairline -->
  <line x1="300" y1="700" x2="500" y2="700" stroke="#4fb8dd" stroke-width="1.5" opacity="0.55"/>
</svg>
